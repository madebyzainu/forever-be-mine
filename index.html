<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zain's Page 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffb6c1, #ffe4e1);
}

#questionScreen {
    text-align: center;
}

h1 {
    font-size: 28px;
    color: #fff;
}

button {
    padding: 12px 20px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yesBtn {
    background: #4CAF50;
    color: white;
}

#noBtn {
    background: #f44336;
    color: white;
    position: absolute;
}

#msgBox {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    display: none;
    z-index: 999;
}

#loveMessage {
    display: none;
    text-align: center;
    font-size: 28px;
    color: white;
}
</style>
</head>

<body>

<div id="questionScreen">
    <h1>Will you forever be mine Ayeshay?? 🥹</h1>
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 💔</button>
</div>

<div id="msgBox"></div>

<div id="loveMessage">
    I knew it 😭💖<br>
    I love you too 🫶🏻💗
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const msgBox = document.getElementById("msgBox");
const questionScreen = document.getElementById("questionScreen");
const loveMessage = document.getElementById("loveMessage");

const messages = [
    "Your heart already said YES 😭💖",
    "Stop running from love 😏💗",
    "The Yes button is waiting 🥹",
    "Be honest… you want YES 💖",
    "That No is just for show 😂",
    "You already chose Yes 😭🫶🏻",
    "Come on don’t do this 😏💗",
    "One tap = happiness 💖",
    "Your destiny says YES 💌"
];

let count = 0;

noBtn.addEventListener("click", function () {

    msgBox.style.display = "block";
    msgBox.innerText = messages[count % messages.length];
    count++;

    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;

    const box = msgBox.getBoundingClientRect();

    const padding = 20;

    const maxX = window.innerWidth - btnW - padding;
    const maxY = window.innerHeight - btnH - padding;

    let x, y;

    do {
        x = padding + Math.random() * maxX;
        y = padding + Math.random() * maxY;
    }
    while (
        x < box.right &&
        x + btnW > box.left &&
        y < box.bottom &&
        y + btnH > box.top
    );

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    setTimeout(() => {
        msgBox.style.display = "none";
    }, 2000);
});

yesBtn.addEventListener("click", function () {
    questionScreen.style.display = "none";
    loveMessage.style.display = "block";
});
</script>

</body>
</html>
