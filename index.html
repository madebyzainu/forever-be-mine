<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        overflow:hidden;
    }

    .container{
        text-align:center;
    }

    h1{
        color:#fff;
        margin-bottom:30px;
        font-size:2rem;
    }

    .buttons{
        position:relative;
        width:350px;
        height:200px;
        margin:auto;
    }

    button{
        padding:12px 30px;
        font-size:18px;
        border:none;
        border-radius:30px;
        cursor:pointer;
        transition:0.3s;
    }

    #yesBtn{
        background:#ff4081;
        color:white;
        margin-right:15px;
    }

    #yesBtn:hover{
        transform:scale(1.1);
    }

    #noBtn{
        background:white;
        color:#333;
        position:absolute;
        left:200px;
        top:0;
    }

    .message{
        display:none;
        text-align:center;
        color:white;
    }

    .message h2{
        font-size:2rem;
        padding:20px;
    }
</style>
</head>
<body>

<div class="container" id="questionScreen">
    <h1>Will you forever be mine? 👀</h1>

    <div class="buttons">
        <button id="yesBtn">Yes 💗</button>
        <button id="noBtn">No 😏</button>
    </div>
</div>

<div class="message" id="loveMessage">
    <h2>I knew that you love me 😋💗<br><br>
    I love you too 😭🫶🏻</h2>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const questionScreen = document.getElementById("questionScreen");
const loveMessage = document.getElementById("loveMessage");

const messages = [
  "Your heart is already saying YES 😭💗",
  "Stop lying to yourself 😏💖",
  "The Yes button is waiting 🥺🫶🏻",
  "Come on don’t fight destiny 💫💗",
  "Be honest… you want YES 😋💖",
  "That No button is illegal 😂💗",
  "You’re one Yes away from happiness 🫶🏻",
  "Your future already said YES 💌",
  "Stop running from love 😭💖"
];

let count = 0;

noBtn.addEventListener("click", function () {
    msgBox.style.display = "block";
    msgBox.innerText = messages[count % messages.length];
    count++;

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const box = msgBox.getBoundingClientRect();

    // 📱 safe margins for mobile
    const padding = 20;

    const maxX = window.innerWidth - btnWidth - padding;
    const maxY = window.innerHeight - btnHeight - padding;

    let x, y;
    let tries = 0;

    do {
        x = padding + Math.random() * maxX;
        y = padding + Math.random() * maxY;
        tries++;
    }
    while (
        x < box.right &&
        x + btnWidth > box.left &&
        y < box.bottom &&
        y + btnHeight > box.top &&
        tries < 50
    );

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    setTimeout(() => {
        msgBox.style.display = "none";
    }, 2000);
});
</body>
</html>
