<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zain's Page 💖</title>

<link rel="icon" href="data:,">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #ffe6ea;
}

/* QUESTION AREA */
#questionScreen {
    text-align: center;
}

h1 {
    font-size: 24px;
    color: #333;
    margin-bottom: 20px;
}

/* BUTTON LAYOUT (SIDE BY SIDE) */
#buttonContainer {
    display: flex;
    justify-content: center;
    gap: 15px;
}

/* BUTTON STYLE */
button {
    padding: 12px 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yesBtn {
    background: #ff4d6d;
    color: white;
}

/* NO BUTTON FLOATING */
#noBtn {
    background: #999;
    color: white;
    position: absolute;
    transition: 0.15s ease;
}

/* MESSAGE BOX */
#msgBox {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    display: none;
    max-width: 85%;
    text-align: center;
    z-index: 999;
    font-size: 16px;
}

/* LOVE SCREEN */
#loveMessage {
    display: none;
    text-align: center;
    font-size: 26px;
    color: #333;
}
</style>
</head>

<body>

<div id="questionScreen">

    <h1>Will you forever be mine Ayeshay? 👀</h1>

    <div id="buttonContainer">
        <button id="yesBtn">Yes ❤️‍🩹</button>
        <button id="noBtn">No 😒</button>
    </div>

</div>

<div id="msgBox"></div>

<div id="loveMessage">
    I knew it 😭💖<br>
    I love you too 🫶🏻💗
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const msgBox = document.getElementById("msgBox");
const questionScreen = document.getElementById("questionScreen");
const loveMessage = document.getElementById("loveMessage");

const messages = [
    "Your heart already knows 💖",
    "Don’t run from love 😏",
    "Be honest… it’s YES 🥺",
    "You’re smiling already 😭💗",
    "Just press YES ❤️‍🩹",
    "Come on… I know you want to 🫶🏻",
    "Stop resisting destiny 💫",
    "One YES = happiness 💖"
];

let count = 0;
let msgTimeout = null;

/* INITIAL POSITION */
window.onload = function () {
    moveNoButton();
};

/* =========================
   NO BUTTON CLICK LOGIC
========================= */
noBtn.addEventListener("click", function () {

    // show message instantly
    msgBox.style.display = "block";
    msgBox.innerText = messages[count % messages.length];
    count++;

    // RESET TIMER (NO STACKING)
    clearTimeout(msgTimeout);

    msgTimeout = setTimeout(() => {
        msgBox.style.display = "none";
    }, 2000);

    moveNoButton();
});

/* =========================
   MOVE NO BUTTON SAFELY
========================= */
function moveNoButton() {
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;

    const padding = 25;

    const maxX = window.innerWidth - btnW - padding;
    const maxY = window.innerHeight - btnH - padding;

    let x = padding + Math.random() * maxX;
    let y = padding + Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

/* YES BUTTON */
yesBtn.addEventListener("click", function () {
    questionScreen.style.display = "none";
    loveMessage.style.display = "block";
});
</script>

</body>
</html>
