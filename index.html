<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zain's Page 💖</title>

<link rel="icon" href="data:,">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #ffe6ea;
    display: flex;
    justify-content: center;
    align-items: center;
}

.screen {
    text-align: center;
}

h1 {
    font-size: 24px;
    color: #333;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #aaa;
    margin-top: 10px;
}

button {
    padding: 12px 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
}

#submitCode, #nextBtn {
    background: #ff4d6d;
    color: white;
}

#buttonContainer {
    display: inline-flex;
    gap: 15px;
}

#yesBtn {
    background: #ff4d6d;
    color: white;
}

#noBtn {
    background: #999;
    color: white;
}

/* floating no button */
.floating {
    position: fixed !important;
}

/* MESSAGE BOX (IMPORTANT FIX: CLICK STILL WORKS UNDER IT) */
#msgBox {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    display: none;
    max-width: 85%;
    text-align: center;
    z-index: 999;
    font-size: 16px;
    pointer-events: none; /* 🔥 FIX: does NOT block clicking */
}

/* LOVE SCREEN */
#loveMessage {
    display: none;
    text-align: center;
    font-size: 26px;
    color: #333;
}

#error {
    color: red;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<!-- 🔐 CODE SCREEN -->
<div id="codeScreen" class="screen">
    <h1>Enter Code 🔐</h1>
    <input type="text" id="codeInput" placeholder="Enter code">
    <br>
    <button id="submitCode">Submit</button>
    <div id="error">Wrong code 😞, try again</div>
</div>

<!-- 🟣 INTRO -->
<div id="introScreen" class="screen" style="display:none;">
    <h1>Welcome Ayesha 👀<br>May you will like this 🫶🏻</h1>
    <button id="nextBtn">Next ⏭️</button>
</div>

<!-- ❤️ MAIN -->
<div id="questionScreen" class="screen" style="display:none;">
    <h1>Will you forever be mine Ayeshay? 👀</h1>

    <div id="buttonContainer">
        <button id="yesBtn">Yes ❤️‍🩹</button>
        <button id="noBtn">No 😒</button>
    </div>
</div>

<!-- MESSAGE -->
<div id="msgBox"></div>

<!-- LOVE -->
<div id="loveMessage">
    I knew it 😭🫶🏻<br><br>
    Love you 😭💋
</div>

<script>

const codeScreen = document.getElementById("codeScreen");
const introScreen = document.getElementById("introScreen");
const questionScreen = document.getElementById("questionScreen");

const codeInput = document.getElementById("codeInput");
const submitCode = document.getElementById("submitCode");
const error = document.getElementById("error");

const nextBtn = document.getElementById("nextBtn");

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

const msgBox = document.getElementById("msgBox");
const loveMessage = document.getElementById("loveMessage");

const messages = [
    "Your heart already knows 💖",
    "Don’t run from love 😏",
    "Be honest… it’s YES 🥺",
    "You’re smiling already 😭💗",
    "Just press YES ❤️‍🩹",
    "Come on… I know you want to 🫶🏻",
    "Stop resisting destiny 💫",
    "One YES = happiness 💖"
];

let count = 0;
let msgTimeout = null;

/* CODE */
submitCode.addEventListener("click", function () {
    if (codeInput.value === "CODE50") {
        codeScreen.style.display = "none";
        introScreen.style.display = "block";
    } else {
        error.style.display = "block";
    }
});

/* NEXT */
nextBtn.addEventListener("click", function () {
    introScreen.style.display = "none";
    questionScreen.style.display = "block";
});

/* YES */
yesBtn.addEventListener("click", function () {
    questionScreen.style.display = "none";
    loveMessage.style.display = "block";
});

/* NO CLICK */
noBtn.addEventListener("click", function () {

    msgBox.style.display = "block";
    msgBox.innerText = messages[count % messages.length];
    count++;

    clearTimeout(msgTimeout);

    msgTimeout = setTimeout(() => {
        msgBox.style.display = "none";
    }, 2000);

    moveNoButton();
});

/* SAFE MOVE (NO GOES TOO LOW FIXED) */
function moveNoButton() {

    noBtn.classList.add("floating");

    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;

    const padding = 20;

    const maxX = window.innerWidth - btnW - padding;
    const maxY = window.innerHeight - btnH - 120; /* 🔥 FIX: prevents going too bottom */

    const x = padding + Math.random() * maxX;
    const y = padding + Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

</script>

</body>
</html>
